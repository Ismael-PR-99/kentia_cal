<!DOCTYPE html>
<html lang="es">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kentia CAL{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/dist/styles.css' %}">
    <style>
        .bg-primary { background-color: #1e3a5f; }
        .text-primary { color: #1e3a5f; }
        .border-primary { border-color: #1e3a5f; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800">
    <nav class="bg-primary text-white shadow-md">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 sm:px-6 lg:px-8">
            <a href="/" class="text-lg font-semibold tracking-wide">Kentia CAL</a>
            <div class="flex flex-wrap items-center gap-2 text-sm sm:gap-4 sm:text-base">
                <a href="{% url 'dashboard' %}" class="rounded px-3 py-1.5 hover:bg-white/10">Dashboard</a>
                <a href="{% url 'feature_list' %}" class="rounded px-3 py-1.5 hover:bg-white/10">Features</a>
                <a href="{% url 'variable_list' %}" class="rounded px-3 py-1.5 hover:bg-white/10">Variables</a>
                <a href="{% url 'release_list' %}" class="rounded px-3 py-1.5 hover:bg-white/10">Releases</a>
                <a href="{% url 'import' %}" class="rounded px-3 py-1.5 hover:bg-white/10">Importar</a>
                <a href="/agents/" class="rounded px-3 py-1.5 hover:bg-white/10">Agentes</a>
            </div>
        </div>
    </nav>

    <main class="mx-auto w-full max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
